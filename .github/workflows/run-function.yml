name: Run Apps Script function

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: Function to run (e.g. testGetPriceSample, dryRunPortfolioUpdate)
        required: true
        default: testGetPriceSample
        type: choice
        options:
          - testGetPriceSample
          - dryRunPortfolioUpdate
          - runDailyPortfolioUpdate

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Configure clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Configure script ID
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: echo "{\"scriptId\":\"$APPS_SCRIPT_ID\",\"rootDir\":\"src\"}" > .clasp.json

      - name: Run function
        id: run
        run: |
          echo "Running ${{ inputs.function_name }}..."
          npx clasp run "${{ inputs.function_name }}" --json 2>&1 | tee run-output.txt || true

      - name: Fetch execution logs
        run: |
          echo "--- Execution logs ---"
          npx clasp logs --json 2>&1 | head -200 || npx clasp logs 2>&1 | head -100 || true

      - name: Upload run output
        uses: actions/upload-artifact@v4
        with:
          name: clasp-run-output
          path: run-output.txt
